<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Operations motion poster">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091321"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0"/>
      <stop offset="45%" stop-color="#67e8f9" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#f4c97b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f4c97b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g stroke="#94a3b8" stroke-opacity="0.17" stroke-width="1">
    <path d="M100 150 H1300"/>
    <path d="M100 300 H1300"/>
    <path d="M100 450 H1300"/>
    <path d="M100 600 H1300"/>
    <path d="M250 80 V740"/>
    <path d="M500 80 V740"/>
    <path d="M750 80 V740"/>
    <path d="M1000 80 V740"/>
    <path d="M1250 80 V740"/>
  </g>

  <rect x="-500" y="0" width="500" height="820" fill="url(#beam)">
    <animate attributeName="x" values="-500;1400" dur="8s" repeatCount="indefinite"/>
  </rect>

  <g>
    <circle cx="430" cy="320" r="150" fill="#67e8f9" fill-opacity="0.08">
      <animate attributeName="r" values="130;170;130" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="470" r="180" fill="#f4c97b" fill-opacity="0.07">
      <animate attributeName="r" values="165;195;165" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#e2e8f0" font-family="'Segoe UI', sans-serif" font-weight="800">
    <text x="110" y="120" font-size="26">LIVE INTELLIGENCE SURFACE</text>
    <text x="110" y="160" font-size="16" fill="#94a3b8">SIGNAL FUSION • OPERATOR VIEW • RAPID RESPONSE</text>
  </g>
</svg>
